<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart</title>
  </head>
  <body>
    <div id="app">
      <!-- Header -->
      <header class="header">
        <div class="header-content">
          <h1>🛍️ Shopping Cart</h1>
          <div class="header-buttons">
            <button id="authBtn" class="btn btn-secondary">Login</button>
          </div>
        </div>
      </header>

      <!-- Main Container -->
      <div class="container">
        <!-- Products Section -->
        <main class="products-section">
          <h2>Products</h2>

          <!-- Auth Modal (hidden by default) -->
          <div id="authModal" class="auth-modal hidden">
            <div class="auth-container">
              <button id="closeAuthBtn" class="close-btn">&times;</button>

              <!-- Login Form -->
              <div id="loginForm" class="auth-form">
                <h3>Login</h3>
                <form id="loginFormElement">
                  <input type="email" name="email" placeholder="Email" required />
                  <input type="password" name="password" placeholder="Password" required />
                  <button type="submit" class="btn btn-primary">Login</button>
                </form>
                <p>Don't have an account? <button type="button" id="switchToRegisterBtn" class="link-btn">Register</button></p>
              </div>

              <!-- Register Form (hidden by default) -->
              <div id="registerForm" class="auth-form hidden">
                <h3>Register</h3>
                <form id="registerFormElement">
                  <input type="email" name="email" placeholder="Email" required />
                  <input type="text" name="full_name" placeholder="Full Name" required />
                  <input type="password" name="password" placeholder="Password" required />
                  <button type="submit" class="btn btn-primary">Register</button>
                </form>
                <p>Already have an account? <button type="button" id="switchToLoginBtn" class="link-btn">Login</button></p>
              </div>
            </div>
          </div>

          <!-- Products Grid -->
          <div id="productsGrid" class="products-grid">
            <div class="product-card">
              <div class="product-placeholder">Loading products...</div>
            </div>
          </div>
        </main>

        <!-- Cart Sidebar -->
        <aside class="cart-section">
          <h2>Shopping Cart</h2>

          <!-- Cart Items -->
          <div id="cartItems" class="cart-items">
            <p class="empty-message">Your cart is empty</p>
          </div>

          <!-- Cart Summary -->
          <div class="cart-summary">
            <div class="summary-row">
              <span>Subtotal:</span>
              <span id="subtotal">$0.00</span>
            </div>
            <div class="summary-row">
              <span>Tax (estimated):</span>
              <span id="tax">$0.00</span>
            </div>
            <div class="summary-row total">
              <span>Total:</span>
              <span id="total">$0.00</span>
            </div>
          </div>

          <!-- Checkout Button -->
          <button id="checkoutBtn" class="btn btn-primary full-width">Checkout</button>
          <button id="continueShoppingBtn" class="btn btn-secondary full-width">Continue Shopping</button>

          <!-- Order Confirmation (hidden by default) -->
          <div id="orderConfirmation" class="order-confirmation hidden">
            <h3>✓ Order Placed!</h3>
            <p>Thank you for your purchase.</p>
            <p>Order ID: <span id="orderId"></span></p>
            <p>Total: <span id="orderTotal"></span></p>
            <button id="newOrderBtn" class="btn btn-primary full-width">Place Another Order</button>
          </div>
        </aside>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
